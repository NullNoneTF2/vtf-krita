name: Build preview artifact

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]

jobs:
  build-linux-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgl1-mesa-dev git

      - name: Build libtxc_dxtn
        run: |
          cmake -S libtxc_dxtn -B libtxc_dxtn/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build libtxc_dxtn/build -j2

      - name: Build VTFLib
        run: |
          cmake -S VTFLib -B VTFLib/build -DCMAKE_BUILD_TYPE=Release -DUSE_LIBTXC_DXTN=ON -DLIBTXC_DXTN_LIBRARY=$GITHUB_WORKSPACE/libtxc_dxtn/build/liblibtxc_dxtn.a
          cmake --build VTFLib/build -j2

      - name: Copy native binary into plugin folder
        run: |
          mkdir -p krita-plugin-source/bin/linux
          cp VTFLib/build/src/libVTFLib13.so krita-plugin-source/bin/linux/libVTFLib13.so

      - name: Upload Linux binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-lib
          path: krita-plugin-source/bin/linux/libVTFLib13.so

  build-windows-preview:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSYS2 and build dependencies
        uses: msys2/setup-msys2@v3
        with:
          msystem: MINGW64
          update: true
          install: |
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-mesa

      - name: Build libtxc_dxtn and VTFLib
        shell: bash -lc
        run: |
          export PATH="/mingw64/bin:$PATH"
          cd "$GITHUB_WORKSPACE/libtxc_dxtn"
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON
          cmake --build build -j2
          cd "$GITHUB_WORKSPACE/VTFLib"
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DUSE_LIBTXC_DXTN=ON -DLIBTXC_DXTN_LIBRARY="$GITHUB_WORKSPACE/libtxc_dxtn/build/liblibtxc_dxtn.a" -G "MSYS Makefiles"
          cmake --build build -j2
          mkdir -p "$GITHUB_WORKSPACE/krita-plugin-source/bin/windows"
          cp VTFLib/build/src/libVTFLib13.dll "$GITHUB_WORKSPACE/krita-plugin-source/bin/windows/libVTFLib13.dll"

      - name: Upload Windows binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-lib
          path: krita-plugin-source/bin/windows/libVTFLib13.dll

  package-preview:
    needs: [build-linux-preview, build-windows-preview]
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Python syntax
        run: |
          python -m compileall krita-plugin-source

      - name: Download Linux binary artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-lib
          path: linux-lib

      - name: Download Windows binary artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-lib
          path: windows-lib

      - name: Create preview package
        run: |
          mkdir -p dist/preview/krita_vtf/bin/linux dist/preview/krita_vtf/bin/windows
          cp -R krita-plugin-source/. dist/preview/krita_vtf/
          cp krita-plugin-source/krita_vtf.desktop dist/preview/krita_vtf.desktop
          cp linux-lib/libVTFLib13.so dist/preview/krita_vtf/bin/linux/libVTFLib13.so
          cp windows-lib/libVTFLib13.dll dist/preview/krita_vtf/bin/windows/libVTFLib13.dll
          cd dist
          zip -r preview.zip preview

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: vtf-krita-preview
          path: dist/preview.zip
